name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Update weekly focus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update weekly focus date range
        run: |
          start_date="$(TZ=Asia/Tokyo date -d '7 days ago' '+%b %-d')"
          end_date="$(TZ=Asia/Tokyo date '+%b %-d, %Y')"
          range="${start_date} - ${end_date}"
          python3 - <<PY
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text()
          start = "<!--START_SECTION:waka-range-->"
          end = "<!--END_SECTION:waka-range-->"
          before, rest = text.split(start, 1)
          _, after = rest.split(end, 1)
          path.write_text(before + start + "${range}" + end + after)
          PY
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update weekly focus date range"
            git push
          fi

      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          TIME_RANGE: last_7_days
          LANG_COUNT: 5
          SHOW_TIME: true
          SHOW_TOTAL: false
          SHOW_TITLE: false
          CODE_LANG: txt
          COMMIT_MESSAGE: Update weekly focus metrics
