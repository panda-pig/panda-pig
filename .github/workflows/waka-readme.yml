name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Update weekly focus
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          TIME_RANGE: last_7_days
          LANG_COUNT: 8
          IGNORED_LANGUAGES: Markdown
          SHOW_TIME: true
          SHOW_TOTAL: false
          SHOW_TITLE: true
          CODE_LANG: txt
          COMMIT_MESSAGE: Update weekly focus metrics
